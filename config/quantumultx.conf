; 中国移动签到 - Quantumult X 配置文件
; 将此配置导入 Quantumult X 使用

[general]
geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://github.com/KOP-XIAO/QuantumultX/raw/master/Scripts/IP_API.js
network_check_url = http://connect.rom.miui.com/generate_204
server_check_url = http://connect.rom.miui.com/generate_204

[dns]
server = system
server = 119.29.29.29
server = 223.5.5.5

[rewrite_local]
# 中国移动 Cookie 捕获
^https:\/\/client\.app\.coc\.10086\.cn\/biz-orange\/LN\/uamonekeylogin\/autoLogin url script-response-body 10086_cookie.js
^https:\/\/clientaccess\.10086\.cn\/biz-orange\/BN\/userInformationService\/getUserInformation url script-response-body 10086_cookie.js
^https:\/\/client\.app\.coc\.10086\.cn\/leadeon-abilityopen-biz\/BN\/obtainToken\/getBigNetToken url script-response-body 10086_cookie.js

[task_local]
# 每天上午9点执行签到
0 9 * * * https://raw.githubusercontent.com/1009394958/10086-checkin/main/10086_checkin.js, tag=中国移动签到, enabled=true

[mitm]
hostname = client.app.coc.10086.cn, clientaccess.10086.cn, *.10086.cn

[filter_local]
# 中国移动API放行
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 17.0.0.0/8, direct
process-name=ChinaMobile, direct
