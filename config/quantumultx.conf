; 10086 转盘 - Quantumult X 配置文件
; 将此配置导入 Quantumult X 使用

[general]
geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://github.com/KOP-XIAO/QuantumultX/raw/master/Scripts/IP_API.js
network_check_url = http://connect.rom.miui.com/generate_204
server_check_url = http://connect.rom.miui.com/generate_204

[dns]
server = system
server = 119.29.29.29
server = 223.5.5.5

[rewrite_local]
; 捕获转盘 QWHD Cookie（打开转盘页面时自动截获）
^https://wx\.10086\.cn/.* url script-request-header https://raw.githubusercontent.com/1009394958/10086-checkin/main/10086_token_harvester.js

[task_local]
; 转盘任务 + 抽奖（每天10点运行）
0 10 * * * https://raw.githubusercontent.com/1009394958/10086-checkin/main/10086_turntable.js, tag=10086转盘, enabled=true

[mitm]
hostname = wx.10086.cn

[filter_local]
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 17.0.0.0/8, direct
process-name=ChinaMobile, direct
